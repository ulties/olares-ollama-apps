metadata:
  title: Qwen3-Coder 32B Q4_K_M (Ollama)
  description: Qwen3-Coder 32B Q4_K_M served via Ollama — Alibaba's coding-focused LLM with 32 billion parameters, 4-bit Q4_K_M quantization, running on a 24GB VRAM GPU.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3-Coder 32B Q4_K_M is a coding-focused large language model from Alibaba's Qwen3 series, served via Ollama. This is the 32-billion-parameter variant with Q4_K_M (4-bit, K-quant medium) quantization — providing the best balance of model quality and memory usage, designed to run on a single 24GB VRAM GPU.

    Model tag: qwen3-coder:32b-q4_K_M
    Quantization: Q4_K_M (4-bit, medium K-quant)
    Parameters: 32 billion
    Serving framework: Ollama
    GPU requirement: 24GB VRAM

    Key features:
    State-of-the-art code generation and completion across 40+ programming languages including Python, JavaScript, TypeScript, Java, C++, Go, Rust, and more.

    Advanced code reasoning capabilities for complex algorithm implementation, debugging, and code review with detailed explanations.

    Support for long context windows enabling analysis of large codebases, multi-file editing, and repository-level understanding.

    Seamless integration with development workflows through OpenAI-compatible API endpoint, making it a drop-in replacement for cloud-based coding assistants.

    Enhanced instruction-following for precise code generation from natural language descriptions, test generation, and documentation writing.

    Built on Qwen3 architecture with unique support for thinking mode (for complex coding problems) and non-thinking mode (for fast code completion).

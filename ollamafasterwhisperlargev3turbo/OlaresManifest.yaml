---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: ollamafasterwhisperlargev3turbo
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/whisper.png
  description: faster-whisper-large-v3-turbo speech recognition model from dropbox-dash served via Ollama — a turbo-optimized large-v3 Whisper model for fast, accurate speech-to-text transcription.
  appid: ollamafasterwhisperlargev3turbo
  title: faster-whisper large-v3-turbo (Ollama)
  version: '1.0.0'
  categories:
    - AI
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: faster-whisper large-v3-turbo
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/whisper.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'hf.co/dropbox-dash/faster-whisper-large-v3-turbo'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    faster-whisper-large-v3-turbo is a turbo-optimized variant of OpenAI's Whisper large-v3 model, provided by dropbox-dash and served via Ollama. It delivers fast, high-accuracy speech-to-text transcription in a wide range of languages.

    Model tag: hf.co/dropbox-dash/faster-whisper-large-v3-turbo
    Type: Automatic speech recognition (ASR)
    Base model: Whisper large-v3
    Serving framework: Ollama

    Key features:
    High-accuracy multilingual speech recognition based on OpenAI Whisper large-v3.

    Turbo-optimized for significantly faster transcription than the standard large-v3 model.

    Supports 99 languages with robust performance across diverse accents and audio conditions.

    OpenAI-compatible transcription API endpoint for seamless integration with audio pipelines.

  developer: Dropbox / OpenAI
  website: https://huggingface.co/dropbox-dash/faster-whisper-large-v3-turbo
  submitter: Olares
  locale:
    - en-US
  license:
    - text: Apache-2.0
      url: https://huggingface.co/dropbox-dash/faster-whisper-large-v3-turbo

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 4000m
  requiredCpu: 100m
  requiredDisk: 50Mi
  limitedDisk: 50Gi
  limitedMemory: 8Gi
  requiredMemory: 4Gi
  requiredGpu: 1Gi
  limitedGpu: 8Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64

permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamafasterwhisperlargev3turbo
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamafasterwhisperlargev3turbo
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}

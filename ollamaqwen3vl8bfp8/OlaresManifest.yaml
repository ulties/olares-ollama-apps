---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: ollamaqwen3vl8bfp8
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Qwen3-VL 8B Instruct FP8 served via Ollama — Alibaba's vision-language model with 8 billion parameters and FP8 quantization.
  appid: ollamaqwen3vl8bfp8
  title: Qwen3-VL 8B FP8 (Ollama)
  version: '1.0.0'
  categories:
    - AI
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Qwen3-VL 8B FP8
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'qwen3-vl:8b-instruct-fp8'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3-VL 8B Instruct FP8 is a vision-language model from Alibaba's Qwen3 series, served via Ollama. This is the 8-billion-parameter variant with FP8 quantization, delivering strong visual understanding with efficient GPU memory usage.

    Model tag: qwen3-vl:8b-instruct-fp8
    Quantization: FP8 (8-bit floating point)
    Parameters: 8 billion
    Serving framework: Ollama

    Key features:
    Advanced image understanding and visual question answering across diverse image types including natural photos, charts, diagrams, and documents.

    High-accuracy OCR and document understanding enabling extraction and analysis of text from scanned documents, invoices, forms, and handwritten notes.

    Multi-turn visual conversations allowing detailed discussion and reasoning about image content across multiple dialogue turns.

    Seamless integration through OpenAI-compatible API endpoint supporting both vision and text requests, making it a drop-in replacement for cloud-based vision-language APIs.

    Strong instruction-following for image captioning, visual reasoning, scene description, and complex multi-step visual analysis tasks.

    Built on Qwen3 architecture with support for thinking mode (for complex visual reasoning) and non-thinking mode (for fast visual Q&A).

  developer: Alibaba
  website: https://qwen.ai/home
  submitter: Olares
  locale:
    - en-US
  license:
    - text: Apache-2.0
      url: https://ollama.com/library/qwen3-vl

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6200m
  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 200Gi
  limitedMemory: 24Gi
  requiredMemory: 3000Mi
  requiredGpu: 1Gi
  limitedGpu: 16Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64

permission:

---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: ollamaqwen317bq4kmcpu
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Qwen3 1.7B Q4_K_M served via Ollama — Alibaba's compact Qwen3 LLM with 1.7 billion parameters and 4-bit Q4_K_M quantization, optimized for CPU.
  appid: ollamaqwen317bq4kmcpu
  title: Qwen3 1.7B Q4_K_M CPU (Ollama)
  version: '1.0.0'
  categories:
    - AI
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Qwen3 1.7B Q4_K_M CPU
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'qwen3:1.7b-q4_K_M'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3 1.7B Q4_K_M is a compact large language model from Alibaba's Qwen3 series, served via Ollama. This is the 1.7-billion-parameter variant with Q4_K_M (4-bit, K-quant medium) quantization, optimized for CPU inference without requiring a GPU.

    Model tag: qwen3:1.7b-q4_K_M
    Quantization: Q4_K_M (4-bit, medium K-quant)
    Parameters: 1.7 billion
    Serving framework: Ollama
    Hardware target: CPU

    Key features:
    Fast and lightweight general-purpose language model suitable for devices without a dedicated GPU.

    Supports thinking mode (for complex reasoning) and non-thinking mode (for fast responses).

    OpenAI-compatible API endpoint for seamless integration with existing tools and workflows.

    Built on the Qwen3 architecture with Q4_K_M quantization for efficient CPU inference, making it ideal for local deployment on systems without a dedicated GPU.

  developer: Alibaba
  website: https://qwen.ai/home
  submitter: Olares
  locale:
    - en-US
  license:
    - text: Apache-2.0
      url: https://ollama.com/library/qwen3

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 5000m
  requiredCpu: 100m
  requiredDisk: 50Mi
  limitedDisk: 50Gi
  limitedMemory: 6Gi
  requiredMemory: 3Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64

permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaqwen317bq4kmcpu
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaqwen317bq4kmcpu
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}

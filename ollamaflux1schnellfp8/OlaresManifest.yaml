---
olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: ollamaflux1schnellfp8
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/flux.png
  description: FLUX.1 schnell FP8 image generation model from Kijai/flux-fp8 served via Ollama — Black Forest Labs' fast text-to-image diffusion model in FP8 precision.
  appid: ollamaflux1schnellfp8
  title: FLUX.1 schnell FP8 (Ollama)
  version: '1.0.0'
  categories:
    - AI
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: FLUX1 schnell FP8
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/flux.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'hf.co/Kijai/flux-fp8:flux1-schnell-fp8-e4m3fn.safetensors'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    FLUX.1 schnell FP8 is a high-speed text-to-image diffusion model from Black Forest Labs, quantized to FP8 (e4m3fn) precision by Kijai. Served via Ollama using the HuggingFace model hub integration.

    Model tag: hf.co/Kijai/flux-fp8:flux1-schnell-fp8-e4m3fn.safetensors
    Quantization: FP8 (e4m3fn)
    Type: Text-to-image diffusion model
    Serving framework: Ollama

    Key features:
    State-of-the-art text-to-image generation with the FLUX.1 schnell architecture optimized for speed.

    FP8 quantization reduces VRAM requirements while maintaining high image quality compared to the full precision model.

    Fast inference suitable for interactive image generation workflows.

    Seamless integration through Ollama's OpenAI-compatible image generation API.

  developer: Black Forest Labs
  website: https://blackforestlabs.ai
  submitter: Olares
  locale:
    - en-US
  license:
    - text: Apache-2.0
      url: https://huggingface.co/Kijai/flux-fp8

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6200m
  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 100Gi
  limitedMemory: 16Gi
  requiredMemory: 8Gi
  requiredGpu: 1Gi
  limitedGpu: 12Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64

permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaflux1schnellfp8
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaflux1schnellfp8
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}

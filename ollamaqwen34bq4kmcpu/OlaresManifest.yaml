  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Qwen3 4B Q4_K_M served via Ollama — Alibaba's efficient general-purpose LLM with 4 billion parameters and 4-bit Q4_K_M quantization, optimized for CPU.
  appid: ollamaqwen34bq4kmcpu
  title: Qwen3 4B Q4_K_M CPU (Ollama)
  version: '1.0.0'
  categories:

---
olaresManifest.version: '0.10.0'
olaresManifest.type: app

metadata:
  name: vllmqwen3coder32binstructawq
  icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/qwen3.png
  description: Qwen3-Coder is Alibaba's powerful coding-focused large language model optimized for code generation, debugging, and software development tasks.
  appid: vllmqwen3coder32binstructawq
  title: Qwen3 Coder 32B (vLLM)
  version: '1.0.0'
  categories:
    - AI

entrances:
  - authLevel: internal
    host: vllmclient
    icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/qwen3.png
    name: vllmclient
    openMethod: window
    port: 8080
    title: Qwen3 Coder 32B

spec:
  versionName: 'Qwen/Qwen3-Coder-32B-Instruct-AWQ'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3-Coder is a powerful coding-focused large language model from Alibaba's Qwen3 series. This 32B parameter model with AWQ 4-bit quantization is optimized to run on a single 24GB VRAM GPU.

    Key features:
    State-of-the-art code generation and completion across 40+ programming languages including Python, JavaScript, TypeScript, Java, C++, Go, Rust, and more.

    Advanced code reasoning capabilities for complex algorithm implementation, debugging, and code review with detailed explanations.

    Support for long context windows enabling analysis of large codebases, multi-file editing, and repository-level understanding.

    Seamless integration with development workflows through OpenAI-compatible API endpoint, making it a drop-in replacement for cloud-based coding assistants.

    Enhanced instruction-following for precise code generation from natural language descriptions, test generation, and documentation writing.

    Built on Qwen3 architecture with unique support for thinking mode (for complex coding problems) and non-thinking mode (for fast code completion).

  developer: Alibaba
  website: https://qwen.ai/home
  sourceCode: https://huggingface.co/Qwen/Qwen3-Coder-32B-Instruct-AWQ
  submitter: Olares
  locale:
    - en-US
  doc: https://qwen.readthedocs.io/en/latest/
  license:
    - text: Apache-2.0
      url: https://huggingface.co/Qwen/Qwen3-Coder-32B-Instruct-AWQ

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 20
  requiredCpu: 1
  requiredDisk: 30Gi
  limitedDisk: 50Gi
  limitedMemory: 30Gi
  requiredMemory: 22Gi
  requiredGpu: 16Gi
  limitedGpu: 30Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64

permission:
  appData: true
  appCache: true
  userData:
  - Home
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - vllmqwen3coder32binstructawq
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: vllmqwen3coder32binstructawq
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}

{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
{{- end }}

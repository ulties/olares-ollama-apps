metadata:
  title: Qwen3 0.6B Q4_K_M (Ollama)
  description: Qwen3 0.6B Q4_K_M served via Ollama — Alibaba's smallest Qwen3 LLM with 0.6 billion parameters and 4-bit Q4_K_M quantization.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3 0.6B Q4_K_M is the smallest model in Alibaba's Qwen3 series, served via Ollama. This 0.6-billion-parameter variant with Q4_K_M (4-bit, K-quant medium) quantization is ideal for edge devices and applications requiring minimal resource usage with fast response times.

    Model tag: qwen3:0.6b-q4_K_M
    Quantization: Q4_K_M (4-bit, medium K-quant)
    Parameters: 0.6 billion
    Serving framework: Ollama

    Key features:
    Ultra-lightweight model designed for scenarios where speed and minimal VRAM usage are priorities.

    Supports thinking mode and non-thinking mode inherited from the Qwen3 architecture.

    OpenAI-compatible API endpoint for easy integration with existing workflows and tools.

    Suitable for rapid prototyping, lightweight chatbots, and on-device inference.

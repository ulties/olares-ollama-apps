metadata:
  title: Qwen3 Coder 32B (vLLM)
  description: Qwen3-Coder 是阿里巴巴推出的强大编程专用大语言模型，针对代码生成、调试和软件开发任务进行了深度优化。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型概览 ##
    Qwen3-Coder 是阿里巴巴 Qwen3 系列中专注于编程的强大大语言模型。该 32B 参数模型采用 AWQ 4 位量化，针对单张 24GB 显存 GPU 进行了优化。

    主要特点：
    支持 40 多种编程语言（包括 Python、JavaScript、TypeScript、Java、C++、Go、Rust 等）的最先进代码生成和补全功能。

    强大的代码推理能力，可处理复杂算法实现、调试和代码审查，并提供详细的解释说明。

    支持超长上下文窗口，可分析大型代码库、进行多文件编辑和仓库级别的代码理解。

    通过 OpenAI 兼容 API 端点与开发工作流无缝集成，可直接替代基于云的编程助手。

    增强的指令执行能力，可精确地从自然语言描述生成代码、编写测试和文档。

    基于 Qwen3 架构，独特支持思维模式（用于复杂编程问题）和非思维模式（用于快速代码补全）之间的无缝切换。

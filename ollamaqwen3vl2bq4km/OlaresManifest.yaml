  name: ollamaqwen3vl2bq4km
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Qwen3-VL 2B Instruct Q4_K_M served via Ollama — Alibaba's vision-language model with 2 billion parameters and 4-bit Q4_K_M quantization.
  appid: ollamaqwen3vl2bq4km
  title: Qwen3-VL 2B Instruct Q4_K_M (Ollama)
  version: '1.0.0'

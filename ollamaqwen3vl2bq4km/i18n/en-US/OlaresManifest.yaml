metadata:
  title: Qwen3-VL 2B Instruct Q4_K_M (Ollama)
  description: Qwen3-VL 2B Instruct Q4_K_M served via Ollama — Alibaba's vision-language model with 2 billion parameters and 4-bit Q4_K_M quantization.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3-VL 2B Instruct Q4_K_M is a vision-language model from Alibaba's Qwen3 series, served via Ollama. This is the ultra-compact 2-billion-parameter variant with Q4_K_M (4-bit, K-quant medium) quantization, designed for deployment on resource-constrained hardware while still providing capable visual understanding.

    Model tag: qwen3-vl:2b-instruct-q4_K_M
    Quantization: Q4_K_M (4-bit, medium K-quant)
    Parameters: 2 billion
    Serving framework: Ollama

    Key features:
    Image understanding and visual question answering across diverse image types including natural photos, charts, diagrams, and documents.

    OCR and document understanding enabling extraction and analysis of text from images, scanned documents, and printed materials.

    Multi-turn visual conversations allowing discussion and reasoning about image content across multiple dialogue turns.

    Seamless integration through OpenAI-compatible API endpoint supporting both vision and text requests, making it a drop-in replacement for cloud-based vision-language APIs.

    Instruction-following for image captioning, visual reasoning, and scene description tasks.

    Built on Qwen3 architecture delivering capable vision-language performance in an extremely lightweight 2B parameter package, ideal for edge deployments and CPU-accessible use cases.

spec:
  versionName: 'qwen3-vl:4b-instruct-q4_K_M'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3-VL 4B Instruct Q4_K_M is a vision-language model from Alibaba's Qwen3 series, served via Ollama. This is the 4-billion-parameter variant with Q4_K_M (4-bit, K-quant medium) quantization, optimized for CPU inference without requiring a GPU.

    Model tag: qwen3-vl:4b-instruct-q4_K_M
    Quantization: Q4_K_M (4-bit, medium K-quant)
    Parameters: 4 billion
    Serving framework: Ollama
    Hardware target: CPU

    Key features:
    Advanced image understanding and visual question answering across diverse image types including natural photos, charts, diagrams, and documents.

    High-accuracy OCR and document understanding enabling extraction and analysis of text from scanned documents, invoices, forms, and handwritten notes.

    Multi-turn visual conversations allowing detailed discussion and reasoning about image content across multiple dialogue turns.

    Seamless integration through OpenAI-compatible API endpoint supporting both vision and text requests, making it a drop-in replacement for cloud-based vision-language APIs.

    Strong instruction-following for image captioning, visual reasoning, scene description, and complex multi-step visual analysis tasks.

    Built on Qwen3 architecture with support for thinking mode (for complex visual reasoning) and non-thinking mode (for fast visual Q&A).

    Compact 4B parameter footprint with Q4_K_M quantization for efficient CPU inference, making it ideal for local deployment on systems without a dedicated GPU.

  developer: Alibaba
  website: https://qwen.ai/home
  submitter: Olares
  locale:
    - en-US
  license:
    - text: Apache-2.0
      url: https://ollama.com/library/qwen3-vl

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}

  name: ollamaqwen3vl4bq4kmcpu
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Qwen3-VL 4B Instruct Q4_K_M served via Ollama — Alibaba's vision-language model with 4 billion parameters and 4-bit Q4_K_M quantization, optimized for CPU.
  appid: ollamaqwen3vl4bq4kmcpu
